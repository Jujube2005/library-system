<header class="top-bar">
    <div class="brand" routerLink="/">
        <span class="brand-caps">RMUTI</span>
        <span class="view-tag">Archive</span>
    </div>

    <div class="actions">
        <button class="theme-toggle" (click)="toggleDarkMode()">
            <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
        </button>

        <!-- Notification Bell -->
        <div class="profile-menu-wrap notification-menu-wrap" *ngIf="profile">
            <button class="notification-btn" (click)="toggleNotificationMenu($event)">
                <span class="material-icons">notifications_none</span>
                <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
            </button>

            <!-- Notification Dropdown -->
            <div class="profile-dropdown notification-dropdown" [class.show]="showNotificationMenu">
                <div class="dropdown-header">
                    <p class="user-email">Notifications</p>
                </div>
                <div class="dropdown-divider"></div>

                <div class="notif-list">
                    <ng-container *ngIf="notifications.length > 0; else emptyNotifs">
                        <div class="notif-item" *ngFor="let notif of notifications"
                            [ngClass]="{'unread': !notif.is_read}" (click)="markAsReadAndGo(notif, $event)">
                            <div class="notif-title">{{ notif.title }}</div>
                            <div class="notif-msg">{{ notif.message }}</div>
                            <div class="notif-time">{{ notif.created_at | date:'short' }}</div>
                        </div>
                    </ng-container>
                    <ng-template #emptyNotifs>
                        <div class="empty-state">
                            No notifications yet
                        </div>
                    </ng-template>
                </div>

                <div class="dropdown-divider"></div>
                <a routerLink="/dashboard/notifications" class="dropdown-item view-all">
                    View All
                </a>
            </div>
        </div>

        <div class="profile-menu-wrap" *ngIf="profile">
            <div class="profile-chip" (click)="toggleProfileMenu($event)">
                <span class="role-badge">{{ profile.role }}</span>
                <span class="user-name">{{ profile.full_name || 'User' }}</span>
                <span class="material-icons dropdown-arrow">expand_more</span>
            </div>

            <div class="profile-dropdown" [class.show]="showProfileMenu">
                <div class="dropdown-header">
                    <p class="user-email">{{ profile.email }}</p>
                </div>
                <div class="dropdown-divider"></div>
                <a routerLink="/dashboard/profile" class="dropdown-item">
                    <span class="material-icons">person_outline</span>
                    Profile Settings
                </a>
                <button (click)="logout()" class="dropdown-item logout-link">
                    <span class="material-icons">logout</span>
                    Sign Out
                </button>
            </div>
        </div>
    </div>
</header>
